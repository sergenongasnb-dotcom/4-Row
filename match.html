<!DOCTYPE html>
<html>
<head>
    <title>Match</title>
</head>
<body>
    <h1>Match <span id="matchId"></span></h1>
    <div id="rouge"></div>
    <div id="jaune"></div>

    <script>
        const matchId = window.location.pathname.split('/')[2];
        document.getElementById('matchId').textContent = matchId;

        async function refreshMatch() {
            const res = await fetch(`/api/match?id=${matchId}`);
            const data = await res.json();
            if (data.success) {
                document.getElementById('rouge').textContent = `Rouge: ${data.match.joueurs[0] || 'attente'}`;
                document.getElementById('jaune').textContent = `Jaune: ${data.match.joueurs[1] || 'attente'}`;
            }
        }

        refreshMatch();
        setInterval(refreshMatch, 2000);
    </script>
</body>
</html>
