<!DOCTYPE html>
<html>
<head>
    <title>Match de tournoi</title>
    <style>
        body { font-family: system-ui; background: #1a2f3f; color: white; text-align: center; padding: 20px; }
        .match-container { max-width: 600px; margin: 0 auto; background: #243b4a; padding: 20px; border-radius: 20px; }
        .info { background: #172d38; padding: 15px; border-radius: 10px; margin: 10px 0; }
        canvas { width: 100%; background: #1f3a48; border-radius: 10px; cursor: pointer; }
        .badge { display: inline-block; padding: 10px; margin: 5px; border-radius: 10px; }
        .red-badge { background: #e63946; }
        .yellow-badge { background: #f4d03f; color: black; }
        .btn { background: #3f6175; color: white; padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; margin: 10px; }
        .winning-cell { box-shadow: 0 0 20px gold; }
        .message { padding: 10px; margin: 10px; border-radius: 10px; font-weight: bold; }
        .error { background: #d64f2c; }
        .success { background: #2d7a4b; }
    </style>
</head>
<body>
    <div class="match-container">
        <h1>⚫ Match <span id="matchId"></span> ⚪</h1>
        
        <div class="info">
            <div id="joueurs">
                <span class="badge red-badge" id="rouge">🔴 <span id="redName">En attente</span></span>
                <span class="badge yellow-badge" id="jaune">🟡 <span id="yellowName">En attente</span></span>
            </div>
            <div id="statut">En attente des joueurs...</div>
            <div id="spectateurs">👁️ 0 spectateur(s)</div>
            <div id="messageBox" class="message" style="display: none;"></div>
        </div>

        <canvas id="board" width="560" height="480"></canvas>
        
        <div style="margin-top: 20px;">
            <button class="btn" onclick="copierLien()">📋 Copier le lien du match</button>
        </div>
    </div>

    <script>
        const matchId = window.location.pathname.split('/')[2];
        document.getElementById('matchId').textContent = matchId;

        let monRole = null;
        let matchData = null;
        let monPseudo = null;
        let winningCells = [];

        // Dimensions canvas
        const CANVAS_WIDTH = 560;
        const CANVAS_HEIGHT = 480;
        const CELL_SIZE = 70;
        const ROWS = 6;
        const COLS = 7;
        const OFFSET_X = (CANVAS_WIDTH - (COLS * CELL_SIZE)) / 2;
        const OFFSET_Y = (CANVAS_HEIGHT - (ROWS * CELL_SIZE)) / 2;

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, isError = true) {
            messageBox.style.display = 'block';
            messageBox.textContent = msg;
            messageBox.className = `message ${isError ? 'error' : 'success'}`;
            setTimeout(() => {
                messageBox.style.display = 'none';
            }, 3000);
        }

        function copierLien() {
            navigator.clipboard.writeText(window.location.href);
            showMessage('Lien copié !', false);
        }

        function checkWin(row, col, player) {
            if (!matchData || !matchData.board) return false;
            const board = matchData.board;
            const directions = [
                { dr: 0, dc: 1 },
                { dr: 1, dc: 0 },
                { dr: 1, dc: 1 },
                { dr: 1, dc: -1 }
            ];

            for (let { dr, dc } of directions) {
                let count = 1;
                let cells = [[row, col]];

                for (let step = 1; step < 4; step++) {
                    const r = row + dr * step;
                    const c = col + dc * step;
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r]?.[c] !== player) break;
                    count++;
                    cells.push([r, c]);
                }

                for (let step = 1; step < 4; step++) {
                    const r = row - dr * step;
                    const c = col - dc * step;
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS || board[r]?.[c] !== player) break;
                    count++;
                    cells.push([r, c]);
                }

                if (count >= 4) {
                    winningCells = cells.slice(0, 4);
                    return true;
                }
            }
            return false;
        }

        async function refreshMatch() {
            const res = await fetch(`/api/match?id=${matchId}`);
            const data = await res.json();
            if (data.success) {
                matchData = data.match;
                updateUI();
                drawBoard();
            }
        }

        function updateUI() {
            // SEULE MODIFICATION ICI : afficher les noms au lieu des badges
            document.getElementById('redName').textContent = matchData.joueurs[0] || 'En attente';
            document.getElementById('yellowName').textContent = matchData.joueurs[1] || 'En attente';
            
            document.getElementById('spectateurs').textContent = `👁️ ${matchData.spectateurs || 0} spectateur(s)`;
            
            if (matchData.statut === 'termine') {
                document.getElementById('statut').textContent = `🏆 Gagnant: ${matchData.gagnant === 'red' ? 'Rouge' : 'Jaune'}`;
                canvas.style.pointerEvents = 'none';
            } else if (matchData.statut === 'en-cours') {
                if (matchData.joueurs[0] && matchData.joueurs[1]) {
                    document.getElementById('statut').textContent = `Partie en cours - Tour: ${matchData.currentPlayer === 'red' ? 'Rouge' : 'Jaune'}`;
                    
                    if (monRole && monRole !== 'spectateur') {
                        if (monRole === matchData.currentPlayer) {
                            canvas.style.pointerEvents = 'auto';
                            canvas.style.cursor = 'pointer';
                        } else {
                            canvas.style.pointerEvents = 'none';
                            canvas.style.cursor = 'default';
                        }
                    } else {
                        canvas.style.pointerEvents = 'none';
                    }
                }
            } else {
                document.getElementById('statut').textContent = 'En attente des joueurs...';
                canvas.style.pointerEvents = 'none';
            }
        }

        function drawBoard() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            ctx.fillStyle = '#265b70';
            ctx.shadowColor = '#10212b';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            ctx.shadowBlur = 0;

            if (!matchData || !matchData.board) return;

            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const x = OFFSET_X + col * CELL_SIZE + CELL_SIZE/2;
                    const y = OFFSET_Y + row * CELL_SIZE + CELL_SIZE/2;
                    const radius = CELL_SIZE * 0.4;

                    ctx.beginPath();
                    ctx.arc(x, y, radius+2, 0, 2 * Math.PI);
                    ctx.fillStyle = '#17323f';
                    ctx.shadowColor = 'black';
                    ctx.shadowBlur = 12;
                    ctx.shadowOffsetY = 3;
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    ctx.beginPath();
                    ctx.arc(x, y, radius-1, 0, 2 * Math.PI);
                    ctx.fillStyle = '#3f6175';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#0e1a25';
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    const cellValue = matchData.board[row]?.[col];
                    if (cellValue) {
                        const gradient = ctx.createRadialGradient(x-8, y-8, 5, x, y, radius+5);
                        if (cellValue === 'red') {
                            gradient.addColorStop(0, '#ff6b7c');
                            gradient.addColorStop(0.7, '#b22234');
                            gradient.addColorStop(1, '#7a1f2b');
                        } else {
                            gradient.addColorStop(0, '#fff7b0');
                            gradient.addColorStop(0.6, '#f4c542');
                            gradient.addColorStop(1, '#b37b2e');
                        }

                        ctx.beginPath();
                        ctx.arc(x, y, radius-3, 0, 2 * Math.PI);
                        ctx.fillStyle = gradient;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = 'black';
                        ctx.shadowOffsetY = 3;
                        ctx.fill();

                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(x-8, y-8, 6, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fill();

                        if (winningCells.some(cell => cell[0] === row && cell[1] === col)) {
                            ctx.beginPath();
                            ctx.arc(x, y, radius+2, 0, 2*Math.PI);
                            ctx.strokeStyle = '#FFD966';
                            ctx.lineWidth = 6;
                            ctx.shadowColor = '#FFB347';
                            ctx.shadowBlur = 20;
                            ctx.stroke();
                            ctx.shadowBlur = 0;
                        }
                    }
                }
            }
        }

        async function jouerCoup(column) {
            if (!monRole || monRole === 'spectateur') {
                showMessage('Tu es spectateur, tu ne peux pas jouer');
                return;
            }
            
            if (matchData.statut !== 'en-cours') {
                showMessage('La partie n\'est pas en cours');
                return;
            }
            
            if (monRole !== matchData.currentPlayer) {
                showMessage('Ce n\'est pas ton tour !');
                return;
            }

            const res = await fetch(`/api/match?id=${matchId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    action: 'jouer', 
                    player: monRole,
                    column: column 
                })
            });
            
            const data = await res.json();
            if (data.success) {
                matchData = data.match;
                
                if (matchData.dernierCoup) {
                    const win = checkWin(
                        matchData.dernierCoup.row,
                        matchData.dernierCoup.column,
                        matchData.dernierCoup.player
                    );
                    
                    if (win) {
                        showMessage('🎉 Victoire !', false);
                    }
                }
                
                drawBoard();
                updateUI();
            } else {
                showMessage(data.error || 'Erreur en jouant le coup');
            }
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const mouseX = (e.clientX - rect.left) * scaleX;
            
            for (let col = 0; col < COLS; col++) {
                const leftX = OFFSET_X + col * CELL_SIZE;
                const rightX = leftX + CELL_SIZE;
                if (mouseX >= leftX && mouseX <= rightX) {
                    jouerCoup(col);
                    break;
                }
            }
        }

        async function rejoindre() {
            const pseudo = prompt("Entre ton nom :");
            if (!pseudo) return;

            monPseudo = pseudo;
            const res = await fetch(`/api/match?id=${matchId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'rejoindre', joueur: pseudo })
            });
            
            const data = await res.json();
            if (data.success) {
                matchData = data.match;
                if (matchData.joueurs[0] === pseudo) {
                    monRole = 'red';
                    showMessage('Tu es le joueur Rouge !', false);
                } else if (matchData.joueurs[1] === pseudo) {
                    monRole = 'yellow';
                    showMessage('Tu es le joueur Jaune !', false);
                } else {
                    monRole = 'spectateur';
                    showMessage('Tu es spectateur', false);
                }
                updateUI();
                drawBoard();
            }
        }

        canvas.addEventListener('click', handleCanvasClick);

        rejoindre();
        setInterval(refreshMatch, 1000);
    </script>
</body>
</html>
